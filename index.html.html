<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>artvision — Калкулатор за принтиране</title>
<style>
  :root{
    --navy: #12182b;
    --navy-2: #1c2540;
    --red: #e2231a;
    --paper: #f3f4f6;
    --card: #ffffff;
    --ink: #1b1f2a;
    --ink-soft: #6b7280;
    --line: #e3e5ea;
    --focus: #2563eb;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color:var(--ink);
  }
  .app{
    max-width:880px;
    margin:0 auto;
    min-height:100vh;
    background:var(--card);
    box-shadow: 0 0 40px rgba(0,0,0,0.06);
  }
  header.brand{
    background: var(--navy);
    background-image: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
    padding:28px 32px 24px;
    color:#fff;
    text-align:center;
  }
  .brand .logo-img{
    max-width:260px;
    width:60%;
    height:auto;
    display:block;
    margin:0 auto;
  }
  .brand .title{
    margin-top:16px;
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#c8cddb;
    border-top:1px solid rgba(255,255,255,0.15);
    padding-top:14px;
  }

  main{ padding:28px 32px 40px; }

  .row{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px 28px;
    margin-bottom:22px;
  }
  .row3{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap:20px 20px;
    margin-bottom:22px;
  }
  .span2{ grid-column: 1 / -1; }
  .field label{
    display:block;
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  select, input[type=text], input[type=number]{
    width:100%;
    padding:10px 12px;
    font-size:14px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#fff;
    color:var(--ink);
  }
  select:focus, input:focus{
    outline:none;
    border-color:var(--focus);
    box-shadow:0 0 0 3px rgba(37,99,235,0.15);
  }

  fieldset.group{
    border:1px solid var(--line);
    border-radius:8px;
    padding:14px 16px 16px;
    margin:0 0 22px;
  }
  fieldset.group legend{
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--ink-soft);
    padding:0 6px;
  }
  .radio-line, .check-line{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
    padding:4px 0;
  }
  .radio-line input, .check-line input{
    width:16px; height:16px; accent-color:var(--red); flex:none;
  }

  .option-row{
    display:grid;
    grid-template-columns: 190px 1fr;
    align-items:center;
    gap:14px;
    margin-bottom:12px;
  }
  .option-row:last-child{ margin-bottom:0; }

  .cut-row{
    display:flex;
    justify-content:flex-end;
    gap:20px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .cut-row .check-line{ font-weight:600; }

  .actions{
    display:grid;
    grid-template-columns: 1fr 1fr 1.2fr;
    gap:14px;
    align-items:stretch;
    margin-top:8px;
  }
  button{
    border:none;
    border-radius:6px;
    font-size:14px;
    font-weight:700;
    letter-spacing:0.3px;
    cursor:pointer;
    padding:14px 10px;
    transition: transform .05s ease, filter .15s ease;
  }
  button:active{ transform: translateY(1px); }
  #calcBtn{ background:var(--red); color:#fff; }
  #calcBtn:hover{ filter:brightness(1.05); }
  #clearBtn{ background:var(--paper); color:var(--ink); border:1px solid var(--line); }
  #clearBtn:hover{ background:#eceef2; }

  .price-box{
    border:1px solid var(--line);
    border-radius:6px;
    background: var(--paper);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:8px;
  }
  .price-box .label{
    font-size:10px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:2px;
  }
  .price-box .value{
    font-size:24px;
    font-weight:800;
    color:var(--ink);
  }
  .price-box.filled .value{ color:var(--red); }

  footer{
    text-align:center;
    font-size:11px;
    color:var(--ink-soft);
    padding:18px 0 8px;
  }

  @media (max-width:560px){
    .row{ grid-template-columns:1fr; }
    .row3{ grid-template-columns:1fr; }
    .option-row{ grid-template-columns:1fr; }
    .actions{ grid-template-columns:1fr; }
    main{ padding:20px; }
  }
</style>
</head>

  "Термо и водоустойчиво фолио - бяло": 1.80,
  "Термо и водоустойчиво фолио - прозрачно": 1.50,
  "Полупрозрачно PVC - hydroprint": 1.50,
};

const LAMINATE_OPTIONS = {
  "30μ мат": 0.58,
  "30μ гланц": 0.55,
  "75μ мат": 1.00,
  "75μ гланц": 0.67,
  "125μ мат": 1.45,
  "125μ гланц": 1.10,
  "250μ мат": 2.30,
  "250μ гланц": 1.85,
  "30μ кадифе": 0.77,
  "36μ Платинен мат": 0.77,
};

const PRODUCTS = {
  "Визитки 90/50мм":         { perSheet: 25, cutsPerBatch: 12 },
  "Визитки 85/55мм":         { perSheet: 25, cutsPerBatch: 12 },
  "Картончета 60/60мм":      { perSheet: 28, cutsPerBatch: 13 },
  "Разпечатки А6 105/148мм": { perSheet: 8,  cutsPerBatch: 8 },
  "Разпечатки А5 148/210мм": { perSheet: 4,  cutsPerBatch: 6 },
  "Разпечатки А4 210/297мм": { perSheet: 2,  cutsPerBatch: 5 },
  "Разпечатки А3 420/297мм": { perSheet: 1,  cutsPerBatch: 4 },
};
const SHEETS_PER_BATCH = 50; // machine can cut this many sheets stacked in one pass

const ONE_SIDE_COLORS = ["Цветно", "Черно"];
const TWO_SIDE_COLORS = ["Цветно/Цветно", "Черно/Черно", "Цветно/Черно"];

const COLOR_TIERS = {
  "Цветно":        [[1,249,0.42], [250,499,0.36], [500,999,0.33], [1000,Infinity,0.30]],
  "Черно":         [[1,249,0.23], [250,499,0.20], [500,999,0.18], [1000,Infinity,0.14]],
  "Цветно/Цветно": [[1,249,0.75], [250,499,0.65], [500,999,0.59], [1000,Infinity,0.50]],
  "Черно/Черно":   [[1,249,0.32], [250,499,0.28], [500,999,0.25], [1000,Infinity,0.22]],
  "Цветно/Черно":  [[1,249,0.53], [250,499,0.46], [500,999,0.43], [1000,Infinity,0.39]],
};

// ---------- DOM ----------
const productField   = document.getElementById('productField');
const productSel   = document.getElementById('product');
const qtyInput      = document.getElementById('qty');
const cutCheck       = document.getElementById('cutCheck');
const customCheck    = document.getElementById('customCheck');
const itemsPerSheetField = document.getElementById('itemsPerSheetField');
const itemsPerSheetInput = document.getElementById('itemsPerSheet');
const cutValueField  = document.getElementById('cutValueField');
const cutValueInput  = document.getElementById('cutValue');
const side1          = document.getElementById('side1');
const side2          = document.getElementById('side2');
const basicRadio     = document.getElementById('basicRadio');
const extraRadio     = document.getElementById('extraRadio');
const basicPaperSel  = document.getElementById('basicPaper');
const extraPaperSel  = document.getElementById('extraPaper');
const laminateCheck  = document.getElementById('laminateCheck');
const laminatePaperSel = document.getElementById('laminatePaper');
const colorSel       = document.getElementById('colorMode');
const priceValue     = document.getElementById('priceValue');
const priceBox       = document.getElementById('priceBox');

function fillSelect(sel, obj, withBlank=true){
  sel.innerHTML = '';
  if(withBlank){
    const blank = document.createElement('option');
    blank.value=''; blank.textContent='';
    sel.appendChild(blank);
  }
  Object.keys(obj).forEach(key=>{
    const opt = document.createElement('option');
    opt.value = key; opt.textContent = key;
    sel.appendChild(opt);
  });
}

function updatePaperSelects(){
  fillSelect(basicPaperSel, basicRadio.checked ? BASIC_PAPERS : {});
  basicPaperSel.disabled = !basicRadio.checked;
  fillSelect(extraPaperSel, extraRadio.checked ? EXTRA_PAPERS : {});
  extraPaperSel.disabled = !extraRadio.checked;
}

function updateLaminateSelect(){
  fillSelect(laminatePaperSel, laminateCheck.checked ? LAMINATE_OPTIONS : {});
  laminatePaperSel.disabled = !laminateCheck.checked;
}

function updateColorSelect(){
  if(side1.checked){
    fillSelect(colorSel, Object.fromEntries(ONE_SIDE_COLORS.map(c=>[c,0])));
  } else if(side2.checked){
    fillSelect(colorSel, Object.fromEntries(TWO_SIDE_COLORS.map(c=>[c,0])));
  } else {
    fillSelect(colorSel, {});
  }
}

function updateCutFieldVisibility(){
  if(customCheck.checked && cutCheck.checked){
    cutValueField.style.display = 'block';
  } else {
    cutValueField.style.display = 'none';
    cutValueInput.value = '';
  }
}

function updateCustomItemVisibility(){
  if(customCheck.checked){
    productField.style.display = 'none';
    itemsPerSheetField.style.display = 'block';
  } else {
    productField.style.display = '';
    itemsPerSheetField.style.display = 'none';
    itemsPerSheetInput.value = '';
  }
  updateCutFieldVisibility();
}

basicRadio.addEventListener('change', updatePaperSelects);
extraRadio.addEventListener('change', updatePaperSelects);
laminateCheck.addEventListener('change', updateLaminateSelect);
side1.addEventListener('change', updateColorSelect);
side2.addEventListener('change', updateColorSelect);
customCheck.addEventListener('change', updateCustomItemVisibility);
cutCheck.addEventListener('change', updateCutFieldVisibility);

// init
fillSelect(productSel, PRODUCTS);
updatePaperSelects();
updateLaminateSelect();
updateColorSelect();
updateCustomItemVisibility();

// ---------- Calculation (ported from button1_Click) ----------
document.getElementById('calcBtn').addEventListener('click', ()=>{
  const c = parseFloat(qtyInput.value);
  if(isNaN(c) || c <= 0){
    priceValue.textContent = 'въведете брой';
    priceBox.classList.remove('filled');
    return;
  }

  let price = 0;
  if(basicPaperSel.value && BASIC_PAPERS[basicPaperSel.value] !== undefined){
    price = BASIC_PAPERS[basicPaperSel.value];
  }
  if(extraPaperSel.value && EXTRA_PAPERS[extraPaperSel.value] !== undefined){
    price = EXTRA_PAPERS[extraPaperSel.value]; // matches original: second switch overwrites price if set
  }

  let l = 0;
  if(laminateCheck.checked && laminatePaperSel.value && LAMINATE_OPTIONS[laminatePaperSel.value] !== undefined){
    l = LAMINATE_OPTIONS[laminatePaperSel.value];
  }

  let list;
  let cutsPerBatchValue = 0;

  if(customCheck.checked){
    const itemsPerSheet = parseFloat(itemsPerSheetInput.value);
    if(isNaN(itemsPerSheet) || itemsPerSheet <= 0){
      priceValue.textContent = 'въведете брой на лист';
      priceBox.classList.remove('filled');
      return;
    }
    list = Math.ceil(c / itemsPerSheet);

    if(cutCheck.checked){
      const cutVal = parseFloat(cutValueInput.value);
      if(isNaN(cutVal)){
        priceValue.textContent = 'въведете стойност за сряз';
        priceBox.classList.remove('filled');
        return;
      }
      cutsPerBatchValue = cutVal;
    }
  } else {
    const productInfo = PRODUCTS[productSel.value];
    if(!productInfo){
      priceValue.textContent = 'изберете изделие';
      priceBox.classList.remove('filled');
      return;
    }
    list = Math.ceil(c / productInfo.perSheet);
    cutsPerBatchValue = productInfo.cutsPerBatch;
  }

  let cvqt = 0;
  const tierKey = colorSel.value;
  if(COLOR_TIERS[tierKey]){
    for(const [min,max,val] of COLOR_TIERS[tierKey]){
      if(list >= min && list <= max){ cvqt = val; break; }
    }
  }

  const total = cvqt + price + l;
  const a = total * list;

  let cutCost = 0;
  if(cutCheck.checked){
    const batches = Math.ceil(list / SHEETS_PER_BATCH);
    let costPerBatch = cutsPerBatchValue * 0.10;
    if(costPerBatch < 1) costPerBatch = 1;
    cutCost = costPerBatch * batches;
  }

  const b = a + cutCost;

  const rounded = Math.round(b * 100) / 100;
  priceValue.textContent = rounded.toFixed(2) + '€';
  priceBox.classList.add('filled');
});

// ---------- Clear (ported from button2_Click) ----------
document.getElementById('clearBtn').addEventListener('click', ()=>{
  productSel.value = '';
  qtyInput.value = '';
  cutCheck.checked = false;
  customCheck.checked = false;
  itemsPerSheetInput.value = '';
  cutValueInput.value = '';
  side1.checked = false;
  side2.checked = false;
  basicRadio.checked = false;
  extraRadio.checked = false;
  laminateCheck.checked = false;
  updatePaperSelects();
  updateLaminateSelect();
  updateColorSelect();
  updateCustomItemVisibility();
  priceValue.textContent = '—';
  priceBox.classList.remove('filled');
});
</script>

</body>
</html>
